<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>AR Basketball</title>
  <script>
    var isAndroid = /android/i.test(navigator.userAgent);
    if (isAndroid) {
      var originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
      navigator.mediaDevices.getUserMedia = function(constraints) {
        if (constraints && constraints.video) {
          constraints.video = {
            facingMode: 'environment',
            width: { ideal: 640 },
            height: { ideal: 480 }
          };
        }
        return originalGetUserMedia(constraints);
      };
    }
  </script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body{margin:0;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif}
    .message-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.5s ease}
    .message-overlay.visible{opacity:1}
    .message-overlay.hidden{display:none}
    .message-box{background:rgba(0,0,0,0.85);padding:30px 50px;border-radius:20px;text-align:center;max-width:80%}
    .message-box h1{color:#fff;font-size:28px;margin:0 0 15px 0;font-weight:600}
    .message-box p{color:#ccc;font-size:18px;margin:0}
    .scan-icon{width:80px;height:80px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}
    #game-hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:20px;z-index:9998;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
    #game-hud.visible{opacity:1}
    #score-display{background:rgba(0,0,0,0.7);padding:12px 24px;border-radius:12px;color:#fff;font-size:24px;font-weight:600}
    #timer-display{background:rgba(0,0,0,0.7);padding:12px 24px;border-radius:12px;color:#fff;font-size:24px;font-weight:600}
    #timer-display.warning{color:#ff6b6b;animation:timerPulse 0.5s ease infinite}
    @keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    #power-meter{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:200px;height:20px;background:rgba(0,0,0,0.5);border-radius:10px;overflow:hidden;z-index:9997;opacity:0;transition:opacity 0.2s ease}
    #power-meter.visible{opacity:1}
    #power-fill{height:100%;width:0%;background:linear-gradient(90deg,#4CAF50,#FFEB3B,#FF5722);transition:width 0.05s linear}
    #power-label{position:fixed;bottom:125px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;font-weight:600;text-shadow:0 2px 4px rgba(0,0,0,0.5);z-index:9997;opacity:0;transition:opacity 0.2s ease}
    #power-label.visible{opacity:1}
    #game-over{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10000;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
    #game-over.visible{opacity:1;pointer-events:auto}
    #game-over h1{color:#fff;font-size:42px;margin:0 0 10px 0}
    #game-over .final-score{color:#FF6D00;font-size:72px;font-weight:700;margin:0 0 10px 0}
    #game-over .score-label{color:#aaa;font-size:20px;margin:0 0 40px 0}
    #play-again{background:#FF6D00;color:#fff;border:none;padding:18px 50px;font-size:22px;font-weight:600;border-radius:50px;cursor:pointer}
    #play-again:hover{background:#ff8533;transform:scale(1.05)}
    #swipe-zone{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;touch-action:none}
    .swipe-trail{position:fixed;z-index:99;pointer-events:none;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,rgba(255,100,0,0.7),transparent);animation:trailFade .4s ease forwards}
    @keyframes trailFade{0%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(.2)}}
    #countdown{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.2s ease}
    #countdown.visible{opacity:1}
    #countdown span{font-size:120px;font-weight:700;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.5);animation:countPop 0.5s ease}
    @keyframes countPop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
    #score-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;font-weight:700;color:#4CAF50;text-shadow:0 4px 20px rgba(0,0,0,0.5);opacity:0;z-index:9997;pointer-events:none}
    #score-popup.show{animation:scorePopup 0.8s ease forwards}
    @keyframes scorePopup{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
  </style>
</head>
<body>

<div id="scan-message" class="message-overlay visible">
  <div class="message-box">
    <svg class="scan-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="25" height="5" fill="white"/><rect x="10" y="10" width="5" height="25" fill="white"/>
      <rect x="65" y="10" width="25" height="5" fill="white"/><rect x="85" y="10" width="5" height="25" fill="white"/>
      <rect x="10" y="85" width="25" height="5" fill="white"/><rect x="10" y="65" width="5" height="25" fill="white"/>
      <rect x="65" y="85" width="25" height="5" fill="white"/><rect x="85" y="65" width="5" height="25" fill="white"/>
      <rect x="30" y="30" width="40" height="40" rx="5" stroke="white" stroke-width="3" fill="none"/>
    </svg>
    <h1>Scan the Marker</h1>
    <p>Point your camera at the marker</p>
  </div>
</div>

<div id="ready-message" class="message-overlay hidden">
  <div class="message-box">
    <h1>🏀 Get Ready!</h1>
    <p>Score as many baskets as possible in 30 seconds!</p>
  </div>
</div>

<div id="countdown"></div>
<div id="game-hud"><div id="score-display">Score: 0</div><div id="timer-display">0:30</div></div>
<div id="power-label">POWER</div>
<div id="power-meter"><div id="power-fill"></div></div>
<div id="score-popup">+1</div>
<div id="game-over"><h1>Time's Up!</h1><p class="final-score" id="final-score">0</p><p class="score-label">baskets scored</p><button id="play-again">Play Again</button></div>
<div id="swipe-zone"></div>

<script>
  var arjsSettings = 'sourceType:webcam;debugUIEnabled:false;';
  if (isAndroid) {
    arjsSettings += 'sourceWidth:640;sourceHeight:480;displayWidth:640;displayHeight:480;';
  }
  document.write('<a-scene embedded arjs="' + arjsSettings + '" vr-mode-ui="enabled:false" renderer="antialias:true;alpha:true;precision:mediump;logarithmicDepthBuffer:true;">');
</script>
  <a-assets timeout="10000">
    <a-asset-item id="hoop-model" src="basketball_hoop.glb"></a-asset-item>
    <img id="backboard-logo" src="backboard-logo.jpg">
  </a-assets>
  <a-entity camera></a-entity>
  <a-marker id="ic-marker" type="pattern" url="ic-marker.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="2"></a-marker>
  <a-entity id="hoop-container" visible="false">
    <a-entity id="hoop-pivot" rotation="-90 0 0">
      <!-- Backboard backing (black, slightly larger than logo to form a thin bezel) -->
      <a-box id="backboard-visual" position="0 0.5 -0.6" width="1.55" height="1.15" depth="0.1" color="#000000" material="side:double"></a-box>
      <!-- Cyan neon trim glowing behind the logo -->
      <a-plane position="0 0.5 -0.535" width="1.58" height="1.18" rotation="0 0 0" color="#5DDEFF" material="shader:flat;side:double"></a-plane>
      <!-- INSERT COIN logo as the backboard face -->
      <a-plane position="0 0.5 -0.525" width="1.5" height="1.1" rotation="0 0 0" material="src:#backboard-logo;shader:flat;side:double;transparent:false"></a-plane>
      <!-- GLB Rim with Net -->
      <a-entity 
        id="rim-model"
        gltf-model="#hoop-model" 
        position="0 0 0.05"
        rotation="0 90 0"
        scale="0.55 0.55 0.55"
      ></a-entity>
    </a-entity>
  </a-entity>
</a-scene>

<script>
var sceneEl = document.querySelector('a-scene');
sceneEl.addEventListener('loaded', function() {
  var GAME_DURATION = 30, gameState = 'scanning', score = 0, timeRemaining = GAME_DURATION, gameTimer = null, gameStartTime = 0;
  var HOOP_MOVE_AMPLITUDE = 0.4, HOOP_MOVE_SPEED = 2.0;
  var hoopOffset = new THREE.Vector3(0, 0, 0);
  var GRAVITY = -9.8, BALL_R = 0.12, FRICTION = 0.3;
  
  var C = {
    rim: {cx:0, cy:0, cz:0.05, majorR:0.30, tubeR:0.025, bounce:0.5},
    backboard: {cx:0, cy:0.5, cz:-0.6, hw:0.775, hh:0.575, hd:0.075, bounce:0.4}
  };
  
  var RIM_SCORE_RADIUS = 0.22;

  var markerVisible = false, hoopInitialized = false, balls = [], swipeStart = null;
  var hoopWorldMatrix = new THREE.Matrix4(), hoopWorldMatrixInverse = new THREE.Matrix4();
  var baseHoopPosition = new THREE.Vector3(), baseHoopQuaternion = new THREE.Quaternion(), baseHoopScale = new THREE.Vector3(1,1,1);
  var rimWorldPos = new THREE.Vector3();

  var scanMessage = document.getElementById('scan-message');
  var readyMessage = document.getElementById('ready-message');
  var countdownEl = document.getElementById('countdown');
  var gameHud = document.getElementById('game-hud');
  var scoreDisplay = document.getElementById('score-display');
  var timerDisplay = document.getElementById('timer-display');
  var powerMeter = document.getElementById('power-meter');
  var powerFill = document.getElementById('power-fill');
  var powerLabel = document.getElementById('power-label');
  var scorePopup = document.getElementById('score-popup');
  var gameOverScreen = document.getElementById('game-over');
  var finalScoreEl = document.getElementById('final-score');
  var playAgainBtn = document.getElementById('play-again');
  var swipeZone = document.getElementById('swipe-zone');
  var markerEl = document.getElementById('ic-marker');
  var hoopContainer = document.getElementById('hoop-container');
  var hoopPivot = document.getElementById('hoop-pivot');

  function showScanMessage() {
    scanMessage.classList.remove('hidden'); scanMessage.classList.add('visible');
    readyMessage.classList.add('hidden'); readyMessage.classList.remove('visible');
  }
  
  function showReadyMessage() {
    scanMessage.classList.remove('visible');
    setTimeout(function() { scanMessage.classList.add('hidden'); }, 500);
    readyMessage.classList.remove('hidden');
    setTimeout(function() { readyMessage.classList.add('visible'); }, 50);
    setTimeout(function() {
      readyMessage.classList.remove('visible');
      setTimeout(function() { readyMessage.classList.add('hidden'); }, 500);
      startCountdown();
    }, 2000);
  }
  
  function startCountdown() {
    gameState = 'countdown';
    var count = 3;
    countdownEl.classList.add('visible');
    function showCount() {
      if (count > 0) {
        countdownEl.innerHTML = '<span>' + count + '</span>';
        if (navigator.vibrate) navigator.vibrate(50);
        count--;
        setTimeout(showCount, 1000);
      } else {
        countdownEl.innerHTML = '<span>GO!</span>';
        if (navigator.vibrate) navigator.vibrate(80);
        setTimeout(function() { countdownEl.classList.remove('visible'); startGame(); }, 500);
      }
    }
    showCount();
  }
  
  function startGame() {
    gameState = 'playing'; score = 0; timeRemaining = GAME_DURATION; gameStartTime = performance.now();
    hoopOffset.set(0, 0, 0);
    gameHud.classList.add('visible');
    updateScoreDisplay(); updateTimerDisplay();
    hoopContainer.setAttribute('visible', 'true');
    gameTimer = setInterval(function() {
      timeRemaining--;
      updateTimerDisplay();
      if (timeRemaining <= 10) timerDisplay.classList.add('warning');
      if (timeRemaining <= 0) endGame();
    }, 1000);
  }
  
  function updateScoreDisplay() { scoreDisplay.textContent = 'Score: ' + score; }
  function updateTimerDisplay() { var m = Math.floor(timeRemaining/60), s = timeRemaining%60; timerDisplay.textContent = m + ':' + (s<10?'0':'') + s; }
  function showScorePopup() { scorePopup.classList.remove('show'); void scorePopup.offsetWidth; scorePopup.classList.add('show'); }
  
  function endGame() {
    gameState = 'ended'; clearInterval(gameTimer);
    gameHud.classList.remove('visible'); timerDisplay.classList.remove('warning');
    powerMeter.classList.remove('visible'); powerLabel.classList.remove('visible');
    finalScoreEl.textContent = score; gameOverScreen.classList.add('visible');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  }
  
  function resetGame() {
    gameState = 'scanning'; score = 0; timeRemaining = GAME_DURATION; hoopOffset.set(0, 0, 0);
    balls.forEach(function(b) { if (b.el && b.el.parentNode) b.el.parentNode.removeChild(b.el); });
    balls = [];
    gameOverScreen.classList.remove('visible');
    hoopContainer.setAttribute('visible', 'false');
    hoopInitialized = false;
    showScanMessage();
  }
  
  playAgainBtn.addEventListener('click', resetGame);

  markerEl.addEventListener('markerFound', function() {
    markerVisible = true; hoopInitialized = true;
    if (gameState === 'scanning') { gameState = 'ready'; showReadyMessage(); }
    else if (gameState === 'playing' || gameState === 'countdown') { hoopContainer.setAttribute('visible', 'true'); }
  });
  markerEl.addEventListener('markerLost', function() { markerVisible = false; });

  function getXY(e) {
    if (e.touches && e.touches[0]) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
    if (e.changedTouches && e.changedTouches[0]) return {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY};
    return {x: e.clientX || 0, y: e.clientY || 0};
  }

  function tsS(e) {
    if (gameState !== 'playing') return;
    e.preventDefault();
    var t = getXY(e);
    swipeStart = {x: t.x, y: t.y, time: Date.now()};
    powerMeter.classList.add('visible'); powerLabel.classList.add('visible');
    powerFill.style.width = '0%';
  }

  function tsM(e) {
    if (gameState !== 'playing') return;
    e.preventDefault();
    if (!swipeStart) return;
    var t = getXY(e);
    var dy = swipeStart.y - t.y;
    var power = Math.min(Math.max(dy / 300, 0), 1);
    powerFill.style.width = (power * 100) + '%';
    var tr = document.createElement('div');
    tr.className = 'swipe-trail';
    tr.style.left = (t.x - 7) + 'px';
    tr.style.top = (t.y - 7) + 'px';
    document.body.appendChild(tr);
    setTimeout(function() { tr.remove(); }, 400);
  }

  function tsE(e) {
    if (gameState !== 'playing') return;
    e.preventDefault();
    powerMeter.classList.remove('visible'); powerLabel.classList.remove('visible');
    if (!swipeStart) return;
    var t = getXY(e);
    var dx = t.x - swipeStart.x, dy = t.y - swipeStart.y;
    swipeStart = null;
    if (dy > -30) return;
    var power = Math.min(Math.max(-dy / 300, 0.1), 1.0);
    var hBias = -dx / window.innerWidth;
    shoot(power, hBias);
  }

  swipeZone.addEventListener('touchstart', tsS, {passive: false});
  swipeZone.addEventListener('touchmove', tsM, {passive: false});
  swipeZone.addEventListener('touchend', tsE, {passive: false});
  swipeZone.addEventListener('mousedown', tsS);
  swipeZone.addEventListener('mousemove', function(e) { if (swipeStart) tsM(e); });
  swipeZone.addEventListener('mouseup', tsE);

  function shoot(power, hBias) {
    if (!hoopInitialized || gameState !== 'playing') return;
    var ball = document.createElement('a-sphere');
    ball.setAttribute('radius', String(BALL_R));
    ball.setAttribute('color', '#FF6D00');
    ball.setAttribute('material', 'roughness:0.55;metalness:0.1');
    
    var cam = document.querySelector('[camera]').object3D;
    var cp = new THREE.Vector3(), cd = new THREE.Vector3();
    cam.getWorldPosition(cp); cam.getWorldDirection(cd);
    
    var sp = cp.clone().add(cd.clone().multiplyScalar(0.3)).add(new THREE.Vector3(0, -0.25, 0));
    ball.setAttribute('position', sp.x + ' ' + sp.y + ' ' + sp.z);
    sceneEl.appendChild(ball);
    
    var baseSpeed = 4.0, maxSpeed = 11.0;
    var speed = baseSpeed + power * (maxSpeed - baseSpeed);
    var toRim = rimWorldPos.clone().sub(sp);
    var arcHeight = 0.3 + power * 0.7;
    var hDist = Math.sqrt(toRim.x * toRim.x + toRim.z * toRim.z);
    var flightTime = hDist / (speed * 0.7);
    
    var vx = toRim.x / flightTime;
    var vz = toRim.z / flightTime;
    var vy = (toRim.y / flightTime) - (0.5 * GRAVITY * flightTime * arcHeight);
    
    var right = new THREE.Vector3();
    right.crossVectors(cd, new THREE.Vector3(0, 1, 0)).normalize();
    vx += right.x * hBias * 3;
    vz += right.z * hBias * 3;
    
    var powerScale = 0.5 + power * 0.7;
    vx *= powerScale; vy *= powerScale; vz *= powerScale;
    
    var b = {
      el: ball, pos: sp.clone(), vel: new THREE.Vector3(vx, vy, vz),
      time: 0, settled: false, scored: false, bounces: 0, cooldowns: {},
      prevY: sp.y
    };
    balls.push(b);
    
    setTimeout(function() {
      if (ball.parentNode) ball.parentNode.removeChild(ball);
      var i = balls.indexOf(b);
      if (i > -1) balls.splice(i, 1);
    }, 8000);
    
    if (navigator.vibrate) navigator.vibrate(20 + power * 30);
  }

  function w2l(v) { return v.clone().applyMatrix4(hoopWorldMatrixInverse); }
  function l2w(v) { return v.clone().applyMatrix4(hoopWorldMatrix); }
  function velW2L(v) { return v.clone().applyMatrix3(new THREE.Matrix3().setFromMatrix4(hoopWorldMatrixInverse)); }
  function velL2W(v) { return v.clone().applyMatrix3(new THREE.Matrix3().setFromMatrix4(hoopWorldMatrix)); }

  function reflect(vel, n, rest) {
    var vn = vel.dot(n);
    if (vn >= 0) return false;
    var vnV = n.clone().multiplyScalar(vn);
    var vtV = vel.clone().sub(vnV);
    vel.copy(vtV.multiplyScalar(1 - FRICTION).add(vnV.multiplyScalar(-rest)));
    return true;
  }

  var RIM_SAMPLES = 20;
  function hitRim(p, v, rim) {
    var cx = rim.cx, cy = rim.cy, cz = rim.cz, majorR = rim.majorR, tubeR = rim.tubeR, bounce = rim.bounce;
    var closestDist = Infinity, closestNormal = null, closestPen = 0;
    for (var i = 0; i < RIM_SAMPLES; i++) {
      var angle = (i / RIM_SAMPLES) * Math.PI * 2;
      var ringX = cx + Math.cos(angle) * majorR;
      var ringY = cy + Math.sin(angle) * majorR;
      var dx = p.x - ringX, dy = p.y - ringY, dz = p.z - cz;
      var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      var minDist = BALL_R + tubeR;
      if (dist < minDist && dist > 0.001 && dist < closestDist) {
        closestDist = dist; closestNormal = new THREE.Vector3(dx/dist, dy/dist, dz/dist); closestPen = minDist - dist;
      }
    }
    if (closestNormal) {
      p.x += closestNormal.x * closestPen; p.y += closestNormal.y * closestPen; p.z += closestNormal.z * closestPen;
      reflect(v, closestNormal, bounce);
      return true;
    }
    return false;
  }

  function hitBox(p, v, b) {
    var clx = Math.max(b.cx - b.hw, Math.min(p.x, b.cx + b.hw));
    var cly = Math.max(b.cy - b.hh, Math.min(p.y, b.cy + b.hh));
    var clz = Math.max(b.cz - b.hd, Math.min(p.z, b.cz + b.hd));
    var dx = p.x - clx, dy = p.y - cly, dz = p.z - clz;
    var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist < BALL_R && dist > 0.001) {
      var n = new THREE.Vector3(dx, dy, dz).normalize();
      var pen = BALL_R - dist;
      p.x += n.x * pen; p.y += n.y * pen; p.z += n.z * pen;
      reflect(v, n, b.bounce);
      return true;
    }
    return false;
  }

  function checkScoreWorld(b) {
    if (b.scored) return;
    
    var rimY = rimWorldPos.y;
    var prevY = b.prevY;
    var currY = b.pos.y;
    
    if (b.vel.y >= 0) {
      b.prevY = currY;
      return;
    }
    
    if (prevY > rimY && currY <= rimY) {
      var dx = b.pos.x - rimWorldPos.x;
      var dz = b.pos.z - rimWorldPos.z;
      var horizDist = Math.sqrt(dx * dx + dz * dz);
      
      if (horizDist < RIM_SCORE_RADIUS) {
        b.scored = true;
        score++;
        updateScoreDisplay();
        showScorePopup();
        if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
      }
    }
    
    b.prevY = currY;
  }

  var lt = performance.now();
  function loop(now) {
    var dt = Math.min((now - lt) / 1000, 0.05);
    lt = now;
    
    if (markerVisible) {
      var markerObj = markerEl.object3D;
      markerObj.updateMatrixWorld(true);
      baseHoopPosition.setFromMatrixPosition(markerObj.matrixWorld);
      baseHoopQuaternion.setFromRotationMatrix(markerObj.matrixWorld);
      baseHoopScale.setFromMatrixScale(markerObj.matrixWorld);
    }
    
    if (gameState === 'playing' && timeRemaining <= 10 && timeRemaining > 0) {
      var elapsed = (now - gameStartTime) / 1000;
      hoopOffset.x = Math.sin(elapsed * HOOP_MOVE_SPEED) * HOOP_MOVE_AMPLITUDE;
    } else {
      hoopOffset.x *= 0.9;
    }
    
    var finalPosition = baseHoopPosition.clone();
    var offsetWorld = hoopOffset.clone().applyQuaternion(baseHoopQuaternion);
    finalPosition.add(offsetWorld);
    
    hoopContainer.object3D.position.copy(finalPosition);
    hoopContainer.object3D.quaternion.copy(baseHoopQuaternion);
    hoopContainer.object3D.scale.copy(baseHoopScale);
    
    hoopPivot.object3D.updateMatrixWorld(true);
    hoopWorldMatrix.copy(hoopPivot.object3D.matrixWorld);
    hoopWorldMatrixInverse.copy(hoopWorldMatrix).invert();
    
    var rimLocal = new THREE.Vector3(0, 0, 0.05);
    rimWorldPos.copy(rimLocal.applyMatrix4(hoopWorldMatrix));
    
    if (!hoopInitialized || gameState !== 'playing') { requestAnimationFrame(loop); return; }
    
    for (var j = 0; j < balls.length; j++) {
      var b = balls[j];
      if (b.settled) continue;
      
      b.vel.y += GRAVITY * dt;
      b.pos.x += b.vel.x * dt;
      b.pos.y += b.vel.y * dt;
      b.pos.z += b.vel.z * dt;
      
      var lp = w2l(b.pos), lv = velW2L(b.vel), ms = Date.now();
      
      if (!b.cooldowns.rim || ms - b.cooldowns.rim > 80) {
        if (hitRim(lp, lv, C.rim)) { b.bounces++; b.cooldowns.rim = ms; if (navigator.vibrate) navigator.vibrate(15); }
      }
      if (!b.cooldowns.bb || ms - b.cooldowns.bb > 120) {
        if (hitBox(lp, lv, C.backboard)) { b.bounces++; b.cooldowns.bb = ms; if (navigator.vibrate) navigator.vibrate(25); }
      }
      
      b.pos.copy(l2w(lp));
      b.vel.copy(velL2W(lv));
      
      checkScoreWorld(b);
      
      b.el.setAttribute('position', b.pos.x + ' ' + b.pos.y + ' ' + b.pos.z);
      b.time += dt;
      var spin = b.scored ? 50 : 400;
      b.el.setAttribute('rotation', (b.time * spin) + ' ' + (b.time * spin * 0.3) + ' 0');
      if (b.pos.y < -10) b.settled = true;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
});
</script>
