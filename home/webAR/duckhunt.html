<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#555; overflow:hidden; width:100vw; height:100vh; touch-action:none; font-family:'Courier New',monospace; }
  #vid { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #c   { position:fixed; inset:0; z-index:10; width:100%; height:100%; }
  #hint { position:fixed; bottom:20px; left:0; right:0; z-index:20; color:rgba(255,255,255,0.35); font-size:9px; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<video id="vid" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="hint">Move phone to aim  ·  Tap to shoot</div>

<script>
// ── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── CAMERA ────────────────────────────────────────────────────────────────
(async function startCam(){
  try {
    let stream;
    try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal:'environment' }, width:{ideal:1280}, height:{ideal:720} } }); }
    catch(e) { stream = await navigator.mediaDevices.getUserMedia({ video: true }); }
    document.getElementById('vid').srcObject = stream;
  } catch(e) { console.warn('no camera', e); }
})();

// iOS orientation permission
(async function reqOrient(){
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
  }
})();

// ── AUDIO ────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function sndShot(){
  const b=AC.createBuffer(1,AC.sampleRate*.1,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=AC.createBufferSource(),g=AC.createGain();
  s.buffer=b; g.gain.value=.7; s.connect(g); g.connect(AC.destination); s.start();
}
function sndHit(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='square'; o.frequency.value=220;
  g.gain.setValueAtTime(.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.15);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+.15);
}

// ── GYRO ──────────────────────────────────────────────────────────────────
// KEY FIX: we track the WRAPPED DELTA from base each frame, then lerp that
// delta — never lerp absolute angles (which snaps at ±90/±180 boundaries).
// ── GYRO ─────────────────────────────────────────────────────────────────
// Portrait phone held upright:
//   gamma = left/right tilt  (-90 to +90)  → controls X pan
//   beta  = forward/back tilt (0 to ±180)  → controls Y pan
//
// We track DELTA from calibration zero, wrapped to avoid boundary snaps.
// Then lerp that delta smoothly — never lerp absolute angles.

const SENS_X = 4.0;   // horizontal feel
const SENS_Y = 3.5;   // vertical feel
const LERP   = 0.08;  // lower = smoother/laggier, higher = snappier

let rawG = 0, rawB = 0;
let baseG = 0, baseB = 0;
let targetDG = 0, targetDB = 0;
let smoothDG = 0, smoothDB = 0;
let gyroReady = false;

function wrap(d, r){ while(d > r/2) d -= r; while(d < -r/2) d += r; return d; }

window.addEventListener('deviceorientation', e => {
  if (e.gamma == null) return;
  rawG = e.gamma || 0;
  rawB = e.beta  || 0;
  if (!gyroReady) {
    baseG = rawG; baseB = rawB;
    gyroReady = true;
  }
  // wrapped delta from calibrated base
  targetDG = wrap(rawG - baseG, 180);
  targetDB = wrap(rawB - baseB, 360);
}, true);

function tickGyro(){
  smoothDG += (targetDG - smoothDG) * LERP;
  smoothDB += (targetDB - smoothDB) * LERP;
}

function worldOffset(){
  return {
    ox:  smoothDG * SENS_X * (W / 100),
    oy:  smoothDB * SENS_Y * (H / 100),
  };
}

// ── BOXES ─────────────────────────────────────────────────────────────────
let boxes    = [];
let lastSpawn = 0;

function toScreen(wx, wy){
  const {ox, oy} = worldOffset();
  return { sx: W/2 + wx + ox, sy: H/2 + wy + oy };
}

function spawnBox(){
  const goRight  = Math.random() > .5;
  const startWx  = goRight ? -W * 0.65 : W * 0.65;
  const startWy  = (Math.random() - .5) * H * 0.5;
  boxes.push({
    wx: startWx, wy: startWy,
    vwx: 0, vwy: 0, gravity: 0, goRight,
    size: 62 + Math.random() * 18,
    alive: true,
    falling:false, fsx:0, fsy:0, fvy:0, fang:0, falpha:1,
  });
}

// ── CROSSHAIR ─────────────────────────────────────────────────────────────
let xhPulse = 0;
function drawCrosshair(){
  const cx = W/2, cy = H/2;
  const s  = 1 + xhPulse * .35;
  const r  = 22*s, arm = 14*s, gap = 6*s;

  function lines(){
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy-r-gap); ctx.lineTo(cx, cy-r-gap-arm);
    ctx.moveTo(cx, cy+r+gap); ctx.lineTo(cx, cy+r+gap+arm);
    ctx.moveTo(cx-r-gap, cy); ctx.lineTo(cx-r-gap-arm, cy);
    ctx.moveTo(cx+r+gap, cy); ctx.lineTo(cx+r+gap+arm, cy);
    ctx.stroke();
  }

  ctx.save();
  // dark outline so it's visible against any background
  ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.lineWidth=5; lines();
  // white inner
  ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=1.8; lines();
  // center dot
  ctx.fillStyle='rgba(0,0,0,0.85)';  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,1)'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  if(xhPulse > 0) xhPulse = Math.max(0, xhPulse - .07);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
let particles = [];
function spawnHit(x, y, sz){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:.04,w:3+Math.random()*(sz*.14)});
  }
}
function drawParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.25; p.life-=p.decay;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle='#aaa';
    ctx.fillRect(p.x-p.w/2,p.y-p.w/2,p.w,p.w); ctx.restore();
    return p.life>0;
  });
}

// ── SHOOT ─────────────────────────────────────────────────────────────────
function fire(){
  AC.resume(); sndShot(); xhPulse = 1;
  const cx=W/2, cy=H/2;
  const hit = boxes.find(b=>{
    if(!b.alive||b.falling) return false;
    const {sx,sy}=toScreen(b.wx,b.wy);
    return Math.abs(sx-cx)<b.size/2+8 && Math.abs(sy-cy)<b.size/2+8;
  });
  if(hit){
    const {sx,sy}=toScreen(hit.wx,hit.wy);
    hit.alive=false; hit.falling=true;
    hit.fsx=sx; hit.fsy=sy; hit.fvy=-4; hit.fang=0; hit.falpha=1;
    sndHit(); spawnHit(cx,cy,hit.size);
  }
}

document.addEventListener('click',      e=>{ fire(); });
document.addEventListener('touchstart', e=>{ e.preventDefault(); fire(); },{passive:false});

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);

  tickGyro();

  // re-fill grid whenever a duck is shot
  if(boxes.filter(b=>b.alive||b.falling).length === 0) spawnGrid();

  for(let i=boxes.length-1; i>=0; i--){
    const b = boxes[i];

    if(b.falling){
      b.fsy+=b.fvy; b.fvy+=.6;
      b.fang+=.1; b.falpha=Math.max(0,b.falpha-.022);
      if(b.falpha<=0){ boxes.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha=b.falpha;
      ctx.translate(b.fsx,b.fsy); ctx.rotate(b.fang);
      ctx.fillStyle='#666';
      ctx.fillRect(-b.size/2,-b.size/2,b.size,b.size);
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
      ctx.strokeRect(-b.size/2,-b.size/2,b.size,b.size);
      ctx.restore();
      continue;
    }

    if(!b.alive){ boxes.splice(i,1); continue; }

    b.wx  += b.vwx;
    b.wy  += b.vwy;
    b.vwy += b.gravity;

    // no culling while movement is paused

    const {sx, sy} = toScreen(b.wx, b.wy);
    const under = Math.abs(sx-W/2) < b.size/2+8 && Math.abs(sy-H/2) < b.size/2+8;

    ctx.fillStyle   = under ? '#8a8a8a' : '#636363';
    ctx.strokeStyle = under ? '#eee'    : '#888';
    ctx.lineWidth   = under ? 2.5 : 1.5;
    ctx.fillRect  (sx-b.size/2, sy-b.size/2, b.size, b.size);
    ctx.strokeRect(sx-b.size/2, sy-b.size/2, b.size, b.size);
  }

  drawParticles();
  drawCrosshair();
}
loop();
</script>
</body>
</html>
