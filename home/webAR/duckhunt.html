<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#555; overflow:hidden; width:100vw; height:100vh; touch-action:none; font-family:'Courier New',monospace; }
  #vid { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; display:none; }
  #c   { position:fixed; inset:0; z-index:10; width:100%; height:100%; }

  .screen { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.75); }
  .panel  { background:#3a3a3a; border:1px solid #777; padding:30px 36px; text-align:center; width:280px; }
  .panel h1 { color:#ddd; font-size:15px; letter-spacing:3px; margin-bottom:8px; }
  .panel p  { color:#888; font-size:9px; line-height:2; margin-bottom:22px; }
  .btn { font-family:'Courier New',monospace; font-size:10px; padding:10px; width:100%; background:#555; color:#ddd; border:1px solid #888; cursor:pointer; display:block; margin:5px 0; letter-spacing:1px; }
  .btn:active { background:#444; }
  .btn.go { background:#3a5a3a; border-color:#5a8a5a; }
  #hint { position:fixed; bottom:24px; left:0; right:0; z-index:20; color:rgba(255,255,255,0.35); font-size:9px; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<video id="vid" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="hint"></div>

<div class="screen" id="start">
  <div class="panel">
    <h1>PROTOTYPE</h1>
    <p>Move phone to aim.<br>Tap to shoot.</p>
    <button class="btn go" id="btn-cam">▶ Play with Camera</button>
    <button class="btn"    id="btn-plain">▶ Play without Camera</button>
  </div>
</div>

<script>
// ── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let useCam  = false;
let running = false;

// ── AUDIO ────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function sndShot(){
  const b=AC.createBuffer(1,AC.sampleRate*.1,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=AC.createBufferSource(),g=AC.createGain();
  s.buffer=b; g.gain.value=.7; s.connect(g); g.connect(AC.destination); s.start();
}
function sndHit(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='square'; o.frequency.value=220;
  g.gain.setValueAtTime(.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.15);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+.15);
}

// ── GYRO ──────────────────────────────────────────────────────────────────
// We track the RAW angle and smoothly lerp toward it.
// worldOffset() gives how much to shift everything on screen
// so that boxes feel anchored in real space.
// When you tilt UP → beta decreases → boxes should shift UP on screen (duck goes up).
// When you pan RIGHT (back cam) → gamma increases → boxes shift RIGHT.

const SENS = 3.0;   // degrees → screen% multiplier
const LERP = 0.12;  // smoothing per frame

let rawG = 0, rawB = 0;        // live gamma/beta from sensor
let smG  = 0, smB  = 0;        // smoothed
let baseG = 0, baseB = 0;      // calibrated zero at game start

window.addEventListener('deviceorientation', e => {
  if (e.gamma == null) return;
  rawG = e.gamma;
  rawB = e.beta;
}, true);

function wrap(d, r){ while(d>r/2) d-=r; while(d<-r/2) d+=r; return d; }

function tickGyro(){
  smG += (rawG - smG) * LERP;
  smB += (rawB - smB) * LERP;
}

function worldOffset(){
  // delta from calibration zero, wrapped to avoid ±boundary snaps
  const dg = wrap(smG - baseG, 180);
  const db = wrap(smB - baseB, 360);
  return {
    ox: -dg * SENS * (W / 100),   // pan right  → boxes move left  (world anchored)
    oy: -db * SENS * (H / 100),   // tilt up    → boxes move up
  };
}

// ── BOXES ─────────────────────────────────────────────────────────────────
// Each box has a WORLD position (wx, wy) = offset from screen center at rest.
// toScreen() adds the gyro worldOffset to convert to actual screen px.
let boxes = [];
let lastSpawn = 0;

function toScreen(wx, wy){
  const {ox, oy} = worldOffset();
  return { sx: W/2 + wx + ox, sy: H/2 + wy + oy };
}

function spawnBox(){
  // Spawn at screen edge in WORLD space — no gyro offset baked in.
  // wx/wy are offsets from the world origin (screen center at calibration).
  const goRight = Math.random() > .5;
  const startWx = goRight ? -W * 0.7 : W * 0.7;     // off screen edge in world space
  const startWy = (Math.random() - .5) * H * 0.55;  // random vertical band

  const speed    = 0.35 + Math.random() * 0.25;      // slow horizontal drift
  const vwy_init = -0.08 - Math.random() * 0.08;     // very gentle upward arc
  const gravity  = 0.002 + Math.random() * 0.001;    // very soft gravity

  boxes.push({
    wx: startWx, wy: startWy,
    vwx: goRight ? speed : -speed,
    vwy: vwy_init,
    gravity,
    goRight,
    size: 60 + Math.random() * 20,                   // slightly bigger = easier to hit
    alive: true,
    falling: false, fsx: 0, fsy: 0, fvy: 0, fang: 0, falpha: 1,
  });
}

// ── CROSSHAIR ──────────────────────────────────────────────────────────────
let xhPulse = 0;
function drawCrosshair(){
  const cx = W/2, cy = H/2;
  const s  = 1 + xhPulse * .4;
  const r  = 22*s, arm = 14*s, gap = 6*s;

  // draw twice: thick dark outline then thin white — always visible
  function lines(){
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy-r-gap);   ctx.lineTo(cx, cy-r-gap-arm);
    ctx.moveTo(cx, cy+r+gap);   ctx.lineTo(cx, cy+r+gap+arm);
    ctx.moveTo(cx-r-gap, cy);   ctx.lineTo(cx-r-gap-arm, cy);
    ctx.moveTo(cx+r+gap, cy);   ctx.lineTo(cx+r+gap+arm, cy);
    ctx.stroke();
  }

  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 4.5; lines();
  ctx.strokeStyle = 'rgba(255,255,255,1)'; ctx.lineWidth = 1.8; lines();
  // center dot
  ctx.fillStyle = 'rgba(0,0,0,0.8)';   ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,1)'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  if(xhPulse > 0) xhPulse = Math.max(0, xhPulse - .07);
}

// ── BACKGROUND ─────────────────────────────────────────────────────────────
function drawBG(){
  if(useCam) return;
  ctx.fillStyle='#585858'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#464646'; ctx.fillRect(0,H*.72,W,H*.28);
  ctx.strokeStyle='#666'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H*.72); ctx.lineTo(W,H*.72); ctx.stroke();
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
let particles = [];
function spawnHit(x,y,sz){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:.04,w:3+Math.random()*(sz*.14)});
  }
}
function drawParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.25; p.life-=p.decay;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle='#aaa';
    ctx.fillRect(p.x-p.w/2,p.y-p.w/2,p.w,p.w); ctx.restore();
    return p.life>0;
  });
}

// ── SHOOT ─────────────────────────────────────────────────────────────────
function fire(){
  if(!running) return;
  AC.resume(); sndShot(); xhPulse = 1;

  const cx=W/2, cy=H/2;
  const hit = boxes.find(b=>{
    if(!b.alive||b.falling) return false;
    const {sx,sy}=toScreen(b.wx,b.wy);
    return Math.abs(sx-cx)<b.size/2+6 && Math.abs(sy-cy)<b.size/2+6;
  });

  if(hit){
    const {sx,sy}=toScreen(hit.wx,hit.wy);
    hit.alive=false; hit.falling=true;
    hit.fsx=sx; hit.fsy=sy; hit.fvy=-4; hit.fang=0; hit.falpha=1;
    sndHit(); spawnHit(cx,cy,hit.size);
  }
}

document.addEventListener('click',       e=>{ if(e.target.closest('.btn')) return; fire(); });
document.addEventListener('touchstart',  e=>{ if(e.target.closest('.btn')) return; e.preventDefault(); fire(); },{passive:false});

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawBG();
  if(!running) return;

  tickGyro();

  // spawn up to 3 boxes, one every 2.2s
  const aliveCount = boxes.filter(b=>b.alive).length;
  const now = Date.now();
  if(aliveCount < 3 && now - lastSpawn > 2800){ lastSpawn=now; spawnBox(); }

  // update & draw boxes
  for(let i=boxes.length-1;i>=0;i--){
    const b=boxes[i];

    if(b.falling){
      b.fsy+=b.fvy; b.fvy+=.6;
      b.fang+=.1; b.falpha=Math.max(0,b.falpha-.02);
      if(b.falpha<=0){ boxes.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha=b.falpha;
      ctx.translate(b.fsx,b.fsy); ctx.rotate(b.fang);
      ctx.fillStyle='#666'; ctx.fillRect(-b.size/2,-b.size/2,b.size,b.size);
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5; ctx.strokeRect(-b.size/2,-b.size/2,b.size,b.size);
      ctx.restore();
      continue;
    }

    if(!b.alive){ boxes.splice(i,1); continue; }

    // move in world space (arc)
    b.wx  += b.vwx;
    b.wy  += b.vwy;
    b.vwy += b.gravity;

    const {sx,sy} = toScreen(b.wx,b.wy);

    // cull when world position has crossed far past the opposite side
    if( (b.goRight && b.wx > W*0.8) || (!b.goRight && b.wx < -W*0.8) || b.wy > H*0.8 ){
      boxes.splice(i,1); continue;
    }

    // highlight when under crosshair
    const under = Math.abs(sx-W/2)<b.size/2+6 && Math.abs(sy-H/2)<b.size/2+6;

    ctx.fillStyle   = under ? '#8a8a8a' : '#666';
    ctx.strokeStyle = under ? '#eee'    : '#888';
    ctx.lineWidth   = under ? 2.5 : 1.5;
    ctx.fillRect  (sx-b.size/2, sy-b.size/2, b.size, b.size);
    ctx.strokeRect(sx-b.size/2, sy-b.size/2, b.size, b.size);
  }

  drawParticles();
  drawCrosshair();   // always on top
}
loop();

// idle loop (shows bg before game starts)
(function idle(){ requestAnimationFrame(idle); if(running) return; ctx.clearRect(0,0,W,H); drawBG(); })();

// ── CAMERA ────────────────────────────────────────────────────────────────
async function startCam(){
  try{
    let stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}); }
    catch(e){ stream=await navigator.mediaDevices.getUserMedia({video:true}); }
    const v=document.getElementById('vid');
    v.srcObject=stream; v.style.display='block'; useCam=true;
  }catch(e){ useCam=false; }
}

async function reqOrient(){
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    try{ await DeviceOrientationEvent.requestPermission(); }catch(e){}
  }
}

function startGame(){
  document.getElementById('start').style.display='none';
  // calibrate gyro zero to current phone position
  baseG=rawG; baseB=rawB; smG=rawG; smB=rawB;
  lastSpawn=Date.now()-2200; // trigger immediate first spawn
  boxes=[];
  running=true;
  document.getElementById('hint').textContent = 'Move phone to aim  ·  Tap to shoot';
}

document.getElementById('btn-cam').addEventListener('click', async ()=>{
  AC.resume(); await reqOrient(); await startCam(); startGame();
});
document.getElementById('btn-plain').addEventListener('click', async ()=>{
  AC.resume(); await reqOrient(); useCam=false; startGame();
});
</script>
</body>
</html>
