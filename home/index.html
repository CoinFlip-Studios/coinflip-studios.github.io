<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#5a5a5a; overflow:hidden; width:100vw; height:100vh; touch-action:none; font-family:'Courier New',monospace; }
  #bg-video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); z-index:0; display:none; }
  #c { position:fixed; inset:0; z-index:10; width:100%; height:100%; }

  .screen {
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.7);
  }
  .box {
    background:#3c3c3c; border:1px solid #888;
    padding:28px 36px; text-align:center; width:280px;
  }
  .box h1 { color:#ddd; font-size:14px; margin-bottom:8px; letter-spacing:2px; }
  .box p  { color:#888; font-size:9px; margin-bottom:20px; line-height:1.8; }
  .btn {
    font-family:'Courier New',monospace; font-size:10px;
    padding:9px 0; width:100%; background:#555; color:#ddd;
    border:1px solid #888; cursor:pointer; display:block; margin:5px 0;
    letter-spacing:1px;
  }
  .btn:hover { background:#666; }
  .btn.go { background:#4a6a4a; border-color:#6a9a6a; }
  .btn.go:hover { background:#5a7a5a; }
</style>
</head>
<body>

<video id="bg-video" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<div class="screen" id="start">
  <div class="box">
    <h1>PROTOTYPE</h1>
    <p>Tap to shoot.<br>Hit the box.</p>
    <button class="btn go" id="btn-cam">Play with Camera</button>
    <button class="btn" id="btn-plain">Play without Camera</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let useCam = false;
let running = false;
let boxes = [];

// ── AUDIO ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function sndShot(){
  const b=AC.createBuffer(1,AC.sampleRate*.1,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=AC.createBufferSource(),g=AC.createGain();
  s.buffer=b; g.gain.value=0.7; s.connect(g); g.connect(AC.destination); s.start();
}
function sndHit(){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='square'; o.frequency.value=220;
  g.gain.setValueAtTime(.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.15);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+.15);
}

// ── BOX ────────────────────────────────────────────────────────────────────
function spawnBox(){
  const goRight = Math.random() > .5;
  const size = 48 + Math.random() * 24;
  boxes.push({
    x: goRight ? -size : W + size,
    y: H*.12 + Math.random() * (H*.6),
    size,
    vx: (1.5 + Math.random() * 1.5) * (goRight ? 1 : -1),
    vy: (Math.random() - .5) * .8,
    goRight,
    alive: true,
    hit: false, hitTimer: 0,
    falling: false, fallVy: 0, fallAlpha: 1, fallAngle: 0,
  });
}

// ── CROSSHAIR ──────────────────────────────────────────────────────────────
let xhPulse = 0;
function drawCrosshair(){
  const cx = W/2, cy = H/2;
  const s = 1 + xhPulse * .5;
  const r = 20*s, arm = 12*s, gap = 5*s;
  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${.7 + xhPulse*.3})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy-r-gap); ctx.lineTo(cx, cy-r-gap-arm);
  ctx.moveTo(cx, cy+r+gap); ctx.lineTo(cx, cy+r+gap+arm);
  ctx.moveTo(cx-r-gap, cy); ctx.lineTo(cx-r-gap-arm, cy);
  ctx.moveTo(cx+r+gap, cy); ctx.lineTo(cx+r+gap+arm, cy);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,255,255,${.7+xhPulse*.3})`;
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  if(xhPulse > 0) xhPulse = Math.max(0, xhPulse - .08);
}

// ── BACKGROUND ─────────────────────────────────────────────────────────────
function drawBG(){
  if(useCam) return;
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#484848';
  ctx.fillRect(0, H*.72, W, H*.28);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H*.72); ctx.lineTo(W, H*.72); ctx.stroke();
}

// ── PARTICLES ──────────────────────────────────────────────────────────────
let particles = [];
function spawnHit(x, y, size){
  for(let i=0;i<8;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    particles.push({
      x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2,
      life:1, decay:.04, w: 4+Math.random()*(size*.2),
    });
  }
}
function updateParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.25; p.life-=p.decay;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle='#aaa';
    ctx.fillRect(p.x-p.w/2, p.y-p.w/2, p.w, p.w);
    ctx.restore();
    return p.life>0;
  });
}

// ── FIRE ───────────────────────────────────────────────────────────────────
function fire(){
  if(!running) return;
  AC.resume();
  sndShot();
  xhPulse = 1;

  const cx = W/2, cy = H/2;
  const hit = boxes.find(b => b.alive && !b.falling &&
    Math.abs(b.x - cx) < b.size/2 + 4 &&
    Math.abs(b.y - cy) < b.size/2 + 4
  );
  if(hit){
    hit.alive = false; hit.hit = true;
    hit.falling = true; hit.fallVy = -4; hit.fallAngle = 0;
    sndHit();
    spawnHit(cx, cy, hit.size);
  }
}

document.addEventListener('click', e=>{ if(e.target.closest('button,.btn')) return; fire(); });
document.addEventListener('touchstart', e=>{ if(e.target.closest('button,.btn')) return; e.preventDefault(); fire(); }, {passive:false});

// ── LOOP ───────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawBG();
  if(!running) return;

  // spawn
  const alive = boxes.filter(b=>b.alive).length;
  if(alive < 3 && Math.random() < .02) spawnBox();

  // update & draw boxes
  for(let i = boxes.length-1; i >= 0; i--){
    const b = boxes[i];

    if(b.falling){
      b.y += b.fallVy; b.fallVy += .55;
      b.fallAngle += .1; b.fallAlpha = Math.max(0, b.fallAlpha-.02);
      if(b.fallAlpha <= 0){ boxes.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha = b.fallAlpha;
      ctx.translate(b.x, b.y); ctx.rotate(b.fallAngle);
      ctx.fillStyle = '#666';
      ctx.fillRect(-b.size/2, -b.size/2, b.size, b.size);
      ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
      ctx.strokeRect(-b.size/2, -b.size/2, b.size, b.size);
      ctx.restore();
      continue;
    }

    if(!b.alive){ boxes.splice(i,1); continue; }

    b.x += b.vx; b.y += b.vy;
    b.vy += (Math.random()-.5)*.08;
    if(b.y < 50)        b.vy =  Math.abs(b.vy);
    if(b.y > H*.68)     b.vy = -Math.abs(b.vy);
    if((b.goRight && b.x > W+80) || (!b.goRight && b.x < -80)){ boxes.splice(i,1); continue; }

    // highlight if under crosshair
    const under = Math.abs(b.x-W/2) < b.size/2+4 && Math.abs(b.y-H/2) < b.size/2+4;

    ctx.save();
    ctx.fillStyle = under ? '#888' : '#666';
    ctx.fillRect(b.x-b.size/2, b.y-b.size/2, b.size, b.size);
    ctx.strokeStyle = under ? '#ccc' : '#888';
    ctx.lineWidth = under ? 2 : 1.5;
    ctx.strokeRect(b.x-b.size/2, b.y-b.size/2, b.size, b.size);
    ctx.restore();
  }

  updateParticles();
  drawCrosshair();
}
loop();

// idle bg
(function idle(){ requestAnimationFrame(idle); if(running) return; ctx.clearRect(0,0,W,H); drawBG(); })();

// ── BUTTONS ────────────────────────────────────────────────────────────────
async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('bg-video'); v.srcObject=s; v.style.display='block'; useCam=true;
  }catch(e){ useCam=false; }
}

document.getElementById('btn-cam').addEventListener('click', async ()=>{
  AC.resume(); await startCam();
  document.getElementById('start').style.display='none';
  running=true;
});
document.getElementById('btn-plain').addEventListener('click', ()=>{
  AC.resume(); useCam=false;
  document.getElementById('start').style.display='none';
  running=true;
});
</script>
</body>
</html>
